name: Feature request
description: Suggest a new capability or improvement
labels: ["type: feature", "needs triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that vpsguard cannot do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How might it work? Config, command, or module you have in mind.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - A module (security or provisioning)
        - CLI
        - TUI
        - Remote / fleet
        - Packaging / install
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
