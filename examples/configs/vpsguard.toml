# vpsguard example configuration.
# profile: homelab | balanced | strict | paranoid
profile = "balanced"

[ssh]
port = 2222
permit_root_login = false
password_auth = false
modern_ciphers = true

[firewall]
enabled = true
backend = "nftables"
default = "deny"
allow = ["80/tcp", "443/tcp"]

[users.deploy]
sudo = true
ssh_keys = ["ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAExampleKeyReplaceMe deploy@vpsguard"]

[updates]
enabled = true
auto_reboot = "02:00"

[fail2ban]
enabled = true
jails = ["sshd"]
bantime = "10m"
maxretry = 5

# Opt-in Docker runtime (disabled by default).
[docker]
enabled = false
users = ["deploy"]

# Opt-in Caddy reverse proxy with automatic HTTPS (disabled by default).
[caddy]
enabled = false

[[caddy.sites]]
domain = "example.com"
reverse_proxy = "localhost:8080"

# Opt-in app deploy (disabled by default).
[app]
enabled = false
framework = "django"   # django | laravel
runtime = "docker"     # docker | native
# repo = "https://github.com/me/myapp.git"
# dir = "/srv/app"
# domain = "example.com"
database = "postgres"  # none | postgres | mysql | redis
